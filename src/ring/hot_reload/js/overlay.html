<div id="__hot-reload-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:999999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;">
  <div style="background:#1a1a2e;border-radius:8px;width:90vw;height:80vh;max-width:1200px;display:flex;flex-direction:column;box-shadow:0 25px 50px rgba(0,0,0,0.5);">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #333;flex-shrink:0;">
      <span style="color:#ff6b6b;font-family:monospace;font-size:14px;font-weight:bold;">Server Error ({{status}})</span>
      <button onclick="dismissOverlay()" style="background:none;border:none;color:#999;font-size:20px;cursor:pointer;padding:0 4px;">&#x2715;</button>
    </div>
    <iframe style="flex:1;border:none;border-radius:0 0 8px 8px;background:#fff;" srcdoc="{{srcdoc}}"></iframe>
  </div>
</div>
